<!DOCTYPE html>
<html>
<head>
<title>Secret Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:"Segoe UI";
    background:#eef3ff;
}

/* hide scrollbars but KEEP UI SAME */
#chat, #sidebar {
    scrollbar-width:none;
    -ms-overflow-style:none;
}
#chat::-webkit-scrollbar,
#sidebar::-webkit-scrollbar { display:none; }

/* LOADING */
#loading{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    font-size:22px;
}

/* APP */
#app{ display:none; height:100vh; }

/* TOPBAR (UNCHANGED) */
#topbar{
    height:50px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    font-weight:600;
}

/* KEEP ORIGINAL BUTTON STYLE EXACTLY */
#callBtn{
    display:none;
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

/* LAYOUT */
#container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR (UNCHANGED) */
#sidebar{
    width:260px;
    background:#0d2b66;
    color:white;
    overflow-y:auto;
}

.chatItem{
    padding:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
}

.chatItem:hover{
    background:rgba(255,255,255,0.1);
}

.avatar{
    width:32px;
    height:32px;
    border-radius:50%;
    background:#3b82f6;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
}

/* CHAT AREA (UNCHANGED) */
#main{
    flex:1;
    display:flex;
    flex-direction:column;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msgRow{ display:flex; margin:8px 0; }
.meRow{ justify-content:flex-end; }

.bubble{
    max-width:70%;
    padding:10px;
    border-radius:10px;
    background:white;
}

/* INPUT AREA (UNCHANGED — your buttons untouched) */
#inputArea{
    display:flex;
    padding:10px;
    background:white;
}

#inputArea input{
    flex:1;
    padding:10px;
}

button{
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

/* ======================= */
/* 🎧 TEAMS CALL OVERLAY */
/* ======================= */

#callUI{
    display:none;
    position:fixed;
    inset:0;
    background:#0b1220;
    color:white;
    z-index:9999;
    flex-direction:column;
}

/* top call bar */
#callHeader{
    padding:15px;
    font-size:18px;
    border-bottom:1px solid #1f2937;
}

/* main area */
#callMain{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* participants */
#participants{
    position:absolute;
    left:0;
    top:50px;
    bottom:80px;
    width:200px;
    background:#0f172a;
    padding:10px;
}

.part{
    padding:8px;
    margin:5px 0;
    background:#111827;
    border-radius:8px;
}

/* bottom controls */
#controls{
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    border-top:1px solid #1f2937;
}

.ctrl{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.end{ background:red; color:white; }
.mute{ background:#334155; color:white; }

/* audio */
audio{ display:none; }
</style>
</head>

<body>

<div id="loading">🔐 Authenticating...</div>

<div id="app">

<div id="topbar">
    <div>💬 Ishaan's Secret Chat ✨</div>
    <div>
        <span id="userName"></span>
        <button id="callBtn" onclick="startCall()">📞 Call</button>
    </div>
</div>

<div id="container">

<div id="sidebar">
    <div id="chatList"></div>
    <button onclick="createChat()">+ New</button>
</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">
    <input id="msg">
    <button onclick="send()">Send</button>
</div>

</div>
</div>
</div>

<!-- CALL UI -->
<div id="callUI">

<div id="callHeader">Call</div>

<div id="participants"></div>

<div id="callMain">
    <h2 id="callStatus">Connecting...</h2>
</div>

<div id="controls">
    <button class="ctrl mute" onclick="toggleMute()">🎤 Mute</button>
    <button class="ctrl end" onclick="endCall()">📞 End</button>
</div>

</div>

<audio id="remoteAudio" autoplay></audio>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey:"AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain:"secret-chat-6de59.firebaseapp.com",
  databaseURL:"https://secret-chat-6de59-default-rtdb.firebaseio.com",
  projectId:"secret-chat-6de59"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();
const provider=new firebase.auth.GoogleAuthProvider();

let currentUser=null;
let currentChatId=null;
let currentCallId=null;

let pc=null;
let localStream=null;
let muted=false;

const servers={ iceServers:[{urls:"stun:stun.l.google.com:19302"}] };

/* AUTH */
auth.onAuthStateChanged(user=>{
    if(user){
        currentUser=user;
        loading.style.display="none";
        app.style.display="block";
        userName.textContent=user.email;

        loadChats();
        listenCalls();
    } else {
        auth.signInWithPopup(provider);
    }
});

/* CHAT (UNCHANGED LOGIC) */
function loadChats(){
    db.ref("chats").on("child_added",snap=>{
        const c=snap.val();
        const div=document.createElement("div");
        div.className="chatItem";
        div.innerHTML=`<div class="avatar">${c.name[0]}</div><div>${c.name}</div>`;
        div.onclick=()=>openChat(snap.key);
        chatList.appendChild(div);
    });
}

function openChat(id){
    currentChatId=id;
    callBtn.style.display="inline-block";

    chat.innerHTML="";

    db.ref("chats/"+id+"/messages").on("child_added",snap=>{
        const m=snap.val();
        const row=document.createElement("div");
        row.className="msgRow";
        if(m.sender===currentUser.email) row.classList.add("meRow");

        row.innerHTML=`
        <div class="bubble">
            <b>${m.sender}</b><br>
            ${m.text}
            <div style="font-size:10px;color:gray;margin-top:5px;">
                ${m.time ? formatTime(m.time) : ""}
            </div>
        </div>
`       ;
        chat.appendChild(row);
    });
}

function send(){
    const text=msg.value;
    if(!text||!currentChatId) return;

    db.ref("chats/"+currentChatId+"/messages").push({
        sender:currentUser.email,
        text,
        time:Date.now()
    });

    msg.value="";
}

function formatTime(ms){
    const d=new Date(ms);
    let h=d.getHours();
    let m=d.getMinutes();

    const ampm=h>=12?"PM":"AM";
    h=h%12;
    h=h||12;
    m=m<10?"0"+m:m;

    return `${h}:${m} ${ampm}`;
}

function createChat(){
    const emails=prompt("Emails:");
    const name=prompt("Name:");

    const list=emails.split(",").map(e=>e.trim());
    list.push(currentUser.email);

    const members={};
    list.forEach(e=>members[e.replace(/\./g,"_")]=true);

    db.ref("chats").push({name,members});
}

/* MIC */
async function getMic(){
    localStream=await navigator.mediaDevices.getUserMedia({audio:true});
}

/* CALL */
async function startCall(){
    await getMic();

    const snap=await db.ref("chats/"+currentChatId).once("value");
    const chat=snap.val();

    const members=Object.keys(chat.members).map(e=>e.replace(/_/g,"."));
    const to=members.find(e=>e!==currentUser.email);

    const call=db.ref("calls").push();

    call.set({
        from:currentUser.email,
        to,
        chatId:currentChatId,
        status:"ringing"
    });

    setup(call.key,true);

    showUI(currentUser.email,to,"Calling...");
}

/* WEBRTC */
async function setup(callId,isCaller){
    pc=new RTCPeerConnection(servers);

    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

    pc.ontrack=(e)=>{
        remoteAudio.srcObject=e.streams[0];
    };

    const ref=db.ref("calls/"+callId);

    pc.onicecandidate=e=>{
        if(e.candidate) ref.child("c").push(JSON.stringify(e.candidate));
    };

    if(isCaller){
        const offer=await pc.createOffer();
        await pc.setLocalDescription(offer);
        ref.update({offer:JSON.stringify(offer)});
    }

    ref.on("value",async snap=>{
        const d=snap.val();
        if(!d) return;

        if(d.offer && !isCaller){
            await pc.setRemoteDescription(JSON.parse(d.offer));
            const ans=await pc.createAnswer();
            await pc.setLocalDescription(ans);
            ref.update({answer:JSON.stringify(ans),status:"accepted"});
        }

        if(d.answer && isCaller){
            await pc.setRemoteDescription(JSON.parse(d.answer));
        }

        if(d.status==="ended"){
            endCall();
        }
    });

    ref.child("c").on("child_added",snap=>{
        pc.addIceCandidate(JSON.parse(snap.val()));
    });
}

/* RECEIVE */
function listenCalls(){
    db.ref("calls").on("value",snap=>{
        const calls=snap.val();
        if(!calls) return;

        Object.entries(calls).forEach(([id,c])=>{
            if(c.to===currentUser.email && c.status==="ringing"){
                currentCallId=id;
                setup(id,false);
                showUI(c.from,currentUser.email,"Incoming Call");
            }
        });
    });
}

/* UI ONLY */
function showUI(a,b,status){
    callUI.style.display="flex";
    callHeader.textContent=`${a} ↔ ${b}`;
    callStatus.textContent=status;

    participants.innerHTML=`
        <div class="part">${a}</div>
        <div class="part">${b}</div>
    `;
}

function endCall(){
    if(currentCallId){
        db.ref("calls/"+currentCallId).update({status:"ended"});
    }
    callUI.style.display="none";
}

function toggleMute(){
    muted=!muted;
    localStream.getAudioTracks()[0].enabled=!muted;
}

</script>

</body>
</html>
