<!DOCTYPE html>
<html>
<head>
<title>Secret Text</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wjgudf9jaf");
</script>

<style>
body { margin:0; font-family:"Segoe UI"; background:#eef3ff; }

#loading {
    position:fixed; inset:0;
    display:flex; justify-content:center; align-items:center;
    background:white; font-size:22px;
}

#app { display:none; height:100vh; }

#topbar {
    height:50px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    font-weight:600;
}

#sidebar {
    width:260px;
    background:#0d2b66;
    color:white;
    height:calc(100vh - 50px);
    float:left;
    overflow-y:auto;
}

.chatItem {
    padding:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
    border-left:3px solid transparent;
    transition:0.2s;
}

.chatItem:hover {
    background:rgba(255,255,255,0.1);
    transform:translateX(4px);
}

.chatItem.active {
    background:rgba(255,255,255,0.2);
    border-left:3px solid #60a5fa;
}

.avatar {
    width:32px; height:32px;
    border-radius:50%;
    background:#3b82f6;
    display:flex; align-items:center; justify-content:center;
    margin-right:10px;
}

#main {
    margin-left:260px;
    height:calc(100vh - 50px);
    display:flex;
    flex-direction:column;
}

#chatHeader {
    padding:10px;
    background:white;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#chat {
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msgRow { display:flex; margin:8px 0; }
.meRow { justify-content:flex-end; }

.bubble {
    max-width:60%;
    padding:10px;
    border-radius:10px;
    background:white;
}

.meRow .bubble { background:#dbeafe; }

#inputArea {
    display:flex;
    padding:10px;
    background:white;
    border-top:1px solid #ddd;
}

#inputArea input { flex:1; padding:10px; }

button {
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover { background:#1e4fd6; }

#typing {
    padding:5px 15px;
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<div id="loading">Authenticating...</div>

<div id="app">

<div id="topbar">
    <div>💬 Ishaan's Secret Chat ✨</div>
    <div id="userName"></div>
</div>

<div id="sidebar">
    <div id="chatList"></div>
    <button onclick="createChat()">+ New Chat</button>
</div>

<div id="main">

<div id="chatHeader">
    <span>Select a chat</span>
    <button id="deleteBtn" style="display:none;background:red;">Delete</button>
</div>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
    <input id="msg">
    <button onclick="send()">Send</button>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain:"secret-chat-6de59.firebaseapp.com",
  projectId:"secret-chat-6de59",
  databaseURL:"https://secret-chat-6de59-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let currentChatId = null;
let typingRef = null;

/* SAFE KEY */
function key(){
    return currentUser?.email?.replace(/\./g,"_");
}

/* =========================
   🟢 PRESENCE SYSTEM
   ========================= */

function setupPresence(){
    const userKey = key();
    if(!userKey) return;

    const statusRef = db.ref("status/" + userKey);

    const offline = {
        state: "offline",
        last_changed: firebase.database.ServerValue.TIMESTAMP
    };

    const online = {
        state: "online",
        last_changed: firebase.database.ServerValue.TIMESTAMP
    };

    db.ref(".info/connected").on("value", snap=>{
        if(!snap.val()) return;

        statusRef.onDisconnect().set(offline);
        statusRef.set(online);
    });
}

/* manual status (optional extras) */
window.addEventListener("blur", ()=> {
    if(currentUser) db.ref("status/"+key()).set({state:"away"});
});

window.addEventListener("focus", ()=> {
    if(currentUser) db.ref("status/"+key()).set({state:"online"});
});

document.addEventListener("keydown", e=>{
    if(e.key.toLowerCase()==="b"){
        if(currentUser) db.ref("status/"+key()).set({state:"busy"});
    }
});

/* =========================
   🔐 AUTH (FIXED SAFE)
   ========================= */

auth.onAuthStateChanged(user=>{
    if(user){
        currentUser = user;

        document.getElementById("loading").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("userName").textContent=user.email;

        loadChats();
        setupPresence();

    } else {
        auth.signInWithPopup(provider).catch(err=>{
            document.getElementById("loading").innerText =
            "Login failed: " + err.message;
        });
    }
});

/* =========================
   💬 LOAD CHATS
   ========================= */

function loadChats(){
    const list = document.getElementById("chatList");
    list.innerHTML = "";

    db.ref("chats").on("child_added", snap=>{
        const chat = snap.val();

        if(!chat.members[key()]) return;

        const div = document.createElement("div");
        div.className = "chatItem";

        div.innerHTML = `
        <div class="avatar">${chat.name[0]}</div>
        ${chat.name}
        `;

        div.onclick = ()=> openChat(snap.key);

        list.appendChild(div);
    });
}

/* =========================
   💬 OPEN CHAT
   ========================= */

function openChat(id){
    currentChatId = id;

    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";

    const header = document.querySelector("#chatHeader span");

    if(typingRef) typingRef.off();
    document.getElementById("typing").textContent = "";

    db.ref("chats/"+id).once("value", snap=>{
        header.textContent = snap.val()?.name || "Chat";
    });

    db.ref("chats/"+id+"/messages").off();

    db.ref("chats/"+id+"/messages")
    .limitToLast(50)
    .on("child_added", snap=>{
        const d = snap.val();

        const row = document.createElement("div");
        row.className = "msgRow";

        if(d.sender === currentUser.email){
            row.classList.add("meRow");
        }

        row.innerHTML = `
        <div class="bubble">
            <b>${d.sender}</b><br>
            ${d.text}
            <div style="font-size:10px;color:gray;margin-top:5px;">
                ${d.time ? formatTime(d.time) : ""}
            </div>
        </div>
        `;

        chatDiv.appendChild(row);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    enableTyping();
}

/* =========================
   📩 SEND MESSAGE
   ========================= */

function send(){
    const input = document.getElementById("msg");
    const text = input.value.trim();

    if(!text || !currentChatId) return;

    db.ref("chats/"+currentChatId+"/messages").push({
        sender: currentUser.email,
        text: text,
        time: Date.now()
    });

    input.value = "";
}

/* =========================
   ⌨️ TYPING (FIXED)
   ========================= */

function enableTyping(){
    const input = document.getElementById("msg");
    const myKey = key();

    typingRef = db.ref("typing/" + currentChatId);
    typingRef.off();

    input.oninput = ()=>{

        typingRef.child(myKey).set({
            email: currentUser.email
        });

        clearTimeout(window.__t);

        window.__t = setTimeout(()=>{
            typingRef.child(myKey).remove();
        }, 1200);
    };

    typingRef.on("value", snap=>{
        const data = snap.val();
        const box = document.getElementById("typing");

        if(!data){
            box.textContent = "";
            return;
        }

        const users = Object.values(data)
            .map(u=>u?.email)
            .filter(Boolean)
            .filter(e=>e !== currentUser.email);

        box.textContent =
            users.length ? users.join(", ") + " is typing..." : "";
    });
}

/* =========================
   🕒 TIME FORMAT
   ========================= */

function formatTime(ms){
    const d = new Date(ms);
    let h = d.getHours();
    let m = d.getMinutes();

    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12;
    h = h || 12;
    m = m < 10 ? "0"+m : m;

    return `${h}:${m} ${ampm}`;
}

/* ENTER KEY */
document.getElementById("msg").addEventListener("keydown", e=>{
    if(e.key === "Enter"){
        e.preventDefault();
        send();
    }
});
</script>

</body>
</html>
