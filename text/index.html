<!DOCTYPE html>
<html>
<head>
    <title>Secret Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f3f2f1;
        }

        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            background: white;
            transition: 0.3s;
        }

        #app {
            display: none;
        }

        /* 🧠 TEAMS STYLE LAYOUT */
        #chatListPanel {
            width: 280px;
            background: #ffffff;
            height: 100vh;
            float: left;
            border-right: 1px solid #ddd;
        }

        #chatContainer {
            margin-left: 280px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        #chatHeader {
            padding: 12px;
            font-weight: 600;
            border-bottom: 1px solid #ddd;
            background: white;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        #inputArea input {
            flex: 1;
            padding: 10px;
        }

        button {
            margin-left: 10px;
            padding: 10px;
        }

        /* 🧠 TEAMS MESSAGE STYLE */
        .msgRow {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }

        .meRow {
            background: #eef6ff;
        }

        .status {
            font-size: 12px;
            color: gray;
        }

        .onlineDot {
            width: 8px;
            height: 8px;
            background: green;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }
    </style>
</head>

<body>

<div id="loading">Authenticating</div>

<div id="app">

    <div id="chatListPanel">
        <div id="chatListHeader">Chats</div>
        <div id="chatList"></div>
        <button onclick="createChat()">+ New Chat</button>
    </div>

    <div id="chatContainer">
        <div id="chatHeader">Select a chat</div>
        <div id="chat"></div>

        <div id="typing"></div>

        <div id="inputArea">
            <input id="msg" placeholder="Type a message...">
            <button onclick="send()">Send</button>
        </div>
    </div>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>
/* =========================
   FIREBASE INIT
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain: "secret-chat-6de59.firebaseapp.com",
  projectId: "secret-chat-6de59",
  storageBucket: "secret-chat-6de59.firebasestorage.app",
  messagingSenderId: "107760706349",
  appId: "1:107760706349:web:aad5387e7d0003d90ca9a4"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* =========================
   STATE
========================= */
let currentUser = null;
let currentChatId = null;

const provider = new firebase.auth.GoogleAuthProvider();

const allowedEmails = [
    "ishaan.raj111@gmail.com",
    "bhagat.prerna@gmail.com",
    "rakesh.chourasia@gmail.com",
    "3121@student.goldendoorschool.org"
];

/* =========================
   LOADING
========================= */
let dots = 0;

setInterval(() => {
    const loading = document.getElementById("loading");
    if (!loading) return;

    dots = (dots + 1) % 4;
    loading.textContent = "Authenticating" + ".".repeat(dots);
}, 200);

/* =========================
   LOGIN
========================= */
function login() {
    auth.getRedirectResult().catch(() => {});
        .catch(err => console.log("Login error:", err));
}

/* =========================
   AUTH STATE
========================= */
auth.onAuthStateChanged(user => {
    const loading = document.getElementById("loading");
    const app = document.getElementById("app");

    if (!user) {
        loading.textContent = "Waiting for login...";
        return;
    }

    const email = (user.email || "").toLowerCase();

    const allowed = allowedEmails.map(e => e.toLowerCase());

    if (!allowed.includes(email)) {
        loading.textContent = "Access denied 🚫";
        auth.signOut();
        return;
    }

    currentUser = user;

    loading.style.opacity = "0";

    setTimeout(() => {
        loading.style.display = "none";
        app.style.display = "block";
    }, 300);

    loadChats();
});

/* =========================
   ONLINE STATUS
========================= */
function setOnline(status) {
    if (!currentUser) return;

    db.ref("status/" + currentUser.email.replace(".", "_")).set({
        online: status
    });
}

window.addEventListener("beforeunload", () => {
    setOnline(false);
});

/* =========================
   LOAD CHATS
========================= */
function loadChats() {
    const chatList = document.getElementById("chatList");
    chatList.innerHTML = "";

    db.ref("chats").on("child_added", snap => {
        const chat = snap.val();

        if (!chat.members || !chat.members[currentUser.email]) return;

        const div = document.createElement("div");
        div.innerHTML = chat.name + `<span class="onlineDot"></span>`;

        div.onclick = () => openChat(snap.key);

        chatList.appendChild(div);
    });
}

/* =========================
   OPEN CHAT
========================= */
function openChat(chatId) {
    currentChatId = chatId;

    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";

    db.ref("chats/" + chatId + "/messages")
    .limitToLast(50)
    .on("child_added", snap => {
        const data = snap.val();

        const sender = data.sender;
        const text = data.text;

        let status = "Sent";
        if (data.delivered) status = "Delivered";
        if (data.seen) status = "Seen";

        const msg = document.createElement("div");
        msg.className = "msgRow";
        if (sender === currentUser.email) msg.classList.add("meRow");

        msg.innerHTML = `
            <div><b>${sender}</b></div>
            <div>${text}</div>
            <div class="status">${status}</div>
        `;

        chatDiv.appendChild(msg);
        chatDiv.scrollTop = chatDiv.scrollHeight;

        // mark seen
        if (sender !== currentUser.email) {
            snap.ref.update({ seen: true });

            if (document.hidden) {
                new Notification("New message", { body: text });
            }
        }
    });

    enableTyping();
}

/* =========================
   SEND MESSAGE
========================= */
function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();

    if (!text || !currentChatId) return;

    db.ref("chats/" + currentChatId + "/messages").push({
        sender: currentUser.email,
        text: text,
        time: Date.now(),
        delivered: true,
        seen: false
    });

    input.value = "";
}

/* =========================
   ENTER KEY
========================= */
document.getElementById("msg").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});

/* =========================
   CREATE CHAT
========================= */
function createChat() {
    const emails = prompt("Enter emails (comma separated):");
    if (!emails) return;

    const list = emails.split(",").map(e => e.trim());
    list.push(currentUser.email);

    const members = {};
    list.forEach(e => members[e] = true);

    const name = prompt("Chat name:");

    db.ref("chats").push({
        name: name || "Chat",
        members: members
    });
}

auth.signInWithPopup(provider).catch(() => {});

/* =========================
   TYPING SYSTEM
========================= */
function enableTyping() {
    const input = document.getElementById("msg");

    input.addEventListener("input", () => {
        db.ref("typing/" + currentChatId + "/" + currentUser.email.replace(".", "_"))
            .set(true);

        setTimeout(() => {
            db.ref("typing/" + currentChatId + "/" + currentUser.email.replace(".", "_"))
                .remove();
        }, 1000);
    });

    db.ref("typing/" + currentChatId).on("value", snap => {
        const typing = snap.val();
        const box = document.getElementById("typing");

        if (typing) {
            box.innerText = "Someone is typing...";
        } else {
            box.innerText = "";
        }
    });
}

/* =========================
   NOTIFICATIONS
========================= */
Notification.requestPermission();
</script>

</body>
</html>
