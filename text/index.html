<!DOCTYPE html>
<html>
<head>
<title>Secret Text</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:"Segoe UI"; background:#eef3ff; }

/* LOADING */
#loading {
    position:fixed; inset:0;
    display:flex; justify-content:center; align-items:center;
    background:white; font-size:22px;
}

/* APP */
#app { display:none; height:100vh; }

/* TOP BAR */
#topbar {
    height:50px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    font-weight:600;
}

/* SIDEBAR */
#sidebar {
    width:260px;
    background:#0d2b66;
    color:white;
    height:calc(100vh - 50px);
    float:left;
    overflow-y:auto;
}

.chatItem {
    padding:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
}
.chatItem:hover { background:rgba(255,255,255,0.1); }

/* AVATAR */
.avatar {
    width:32px; height:32px;
    border-radius:50%;
    background:#3b82f6;
    display:flex; align-items:center; justify-content:center;
    margin-right:10px;
    position:relative;
}

.onlineDot {
    position:absolute;
    bottom:0; right:0;
    width:8px; height:8px;
    background:limegreen;
    border-radius:50%;
}

/* MAIN */
#main {
    margin-left:260px;
    height:calc(100vh - 50px);
    display:flex;
    flex-direction:column;
}

/* CHAT HEADER */
#chatHeader {
    padding:10px;
    background:white;
    border-bottom:1px solid #ddd;
    display:flex;
    align-items:center;
    gap:10px;
}

/* CHAT */
#chat {
    flex:1;
    overflow-y:auto;
    padding:15px;
}

/* MESSAGE */
.msgRow {
    display:flex;
    margin:8px 0;
}

.meRow { justify-content:flex-end; }

.bubble {
    max-width:60%;
    padding:10px;
    border-radius:10px;
    background:white;
}

.meRow .bubble { background:#dbeafe; }

.status { font-size:10px; color:gray; }

/* INPUT */
#inputArea {
    display:flex;
    padding:10px;
    background:white;
    border-top:1px solid #ddd;
}
#inputArea input { flex:1; padding:10px; }

button {
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="loading">Authenticating...</div>

<div id="app">

<div id="topbar">
    <div>💬 Blue Teams</div>
    <div id="userName"></div>
</div>

<div id="sidebar">
    <div id="chatList"></div>
    <button onclick="createChat()">+ New Chat</button>
</div>

<div id="main">
    <div id="chatHeader">Select a chat</div>
    <div id="chat"></div>
    <div id="typing"></div>

    <div id="inputArea">
        <input id="msg">
        <button onclick="send()">Send</button>
    </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain:"secret-chat-6de59.firebaseapp.com",
  projectId:"secret-chat-6de59",
  databaseURL:"https://secret-chat-6de59-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let currentChatId = null;

/* AUTH */
auth.onAuthStateChanged(user=>{
    if(!user) return;

    currentUser = user;

    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("userName").textContent = user.email;

    setOnline(true);
    loadChats();
});

window.addEventListener("load",()=>{
    if(!auth.currentUser){
        auth.signInWithPopup(provider).catch(()=>{});
    }
});

/* ONLINE */
function setOnline(status){
    db.ref("status/"+key()).set({online:status});
}

/* KEY SAFE */
function key(){
    return currentUser.email.replace(/\./g,"_");
}

/* LOAD CHATS */
function loadChats(){
    db.ref("chats").on("child_added",snap=>{
        const chat = snap.val();
        if(!chat.members[key()]) return;

        const div = document.createElement("div");
        div.className="chatItem";

        div.innerHTML = `
        <div class="avatar">${chat.name[0]}
            <div class="onlineDot"></div>
        </div>
        ${chat.name}
        `;

        div.onclick=()=>openChat(snap.key);

        document.getElementById("chatList").appendChild(div);
    });
}

/* OPEN CHAT */
function openChat(id){
    currentChatId=id;

    const chat = document.getElementById("chat");
    chat.innerHTML="";

    db.ref("chats/"+id+"/messages").off();

    db.ref("chats/"+id+"/messages").limitToLast(50)
    .on("child_added",snap=>{
        const m = snap.val();

        const row=document.createElement("div");
        row.className="msgRow";
        if(m.sender===currentUser.email) row.classList.add("meRow");

        row.innerHTML=`
        <div class="bubble">
            <b>${m.sender}</b><br>
            ${m.text}
            <div class="status">${m.seen?"Seen":"Delivered"}</div>
        </div>
        `;

        chat.appendChild(row);
        chat.scrollTop=chat.scrollHeight;

        if(m.sender!==currentUser.email){
            snap.ref.update({seen:true});
        }
    });

    typingSystem();
}

/* SEND */
function send(){
    const input=document.getElementById("msg");
    const text=input.value.trim();
    if(!text||!currentChatId) return;

    db.ref("chats/"+currentChatId+"/messages").push({
        sender:currentUser.email,
        text:text,
        seen:false
    });

    input.value="";
}

/* TYPING */
function typingSystem(){
    const input=document.getElementById("msg");

    input.oninput=()=>{
        db.ref("typing/"+currentChatId+"/"+key()).set(true);

        setTimeout(()=>{
            db.ref("typing/"+currentChatId+"/"+key()).remove();
        },1000);
    };

    db.ref("typing/"+currentChatId).on("value",snap=>{
        const t=snap.val();
        document.getElementById("typing").textContent =
            t? "Someone is typing..." : "";
    });
}

/* CREATE */
function createChat(){
    const emails=prompt("Emails:");
    if(!emails) return;

    const list=emails.split(",").map(e=>e.trim());
    list.push(currentUser.email);

    const members={};
    list.forEach(e=>members[e.replace(/\./g,"_")]=true);

    const name=prompt("Chat name:");

    db.ref("chats").push({
        name:name||"Chat",
        members:members
    });
}
</script>

</body>
</html>
