<!DOCTYPE html>
<html>
<head>
<title>Secret Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wjgudf9jaf");
</script>

<style>
body {
    margin:0;
    font-family:"Segoe UI";
    background:#eef3ff;
}

/* scrollbars hidden */
#chat,#sidebar{
    scrollbar-width:none;
    -ms-overflow-style:none;
}
#chat::-webkit-scrollbar,
#sidebar::-webkit-scrollbar{display:none}

/* LOADING */
#loading{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
}

/* APP */
#app{display:none;height:100vh}

#topbar{
    height:50px;
    background:#2563eb;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
}

#callBtn{
    display:none;
    padding:10px;
    background:#1d4ed8;
    color:white;
    border:none;
    cursor:pointer;
}

/* layout */
#container{display:flex;height:calc(100vh - 50px)}

#sidebar{
    width:260px;
    background:#0d2b66;
    color:white;
    overflow-y:auto;
}

.chatItem{
    padding:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
}

.avatar{
    width:32px;height:32px;
    border-radius:50%;
    background:#3b82f6;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
}

#main{flex:1;display:flex;flex-direction:column}

#chat{flex:1;overflow-y:auto;padding:15px}

.msgRow{display:flex;margin:8px 0}
.meRow{justify-content:flex-end}

.bubble{
    max-width:70%;
    padding:10px;
    border-radius:10px;
    background:white;
}

/* input */
#inputArea{display:flex;padding:10px;background:white}
#inputArea input{flex:1;padding:10px}

button{
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

/* CALL UI */
#callUI{
    display:none;
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top, #111827, #05070f);
    color:white;
    z-index:9999;
    flex-direction:column;
    font-family:"Segoe UI", sans-serif;
}

/* HEADER */
#callHeader{
    padding:14px;
    text-align:center;
    font-weight:600;
    font-size:14px;
    letter-spacing:0.5px;
    opacity:0.9;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

/* STATUS AREA */
#callMain{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap:10px;
}

/* BIG NAME TEXT */
#status{
    font-size:22px;
    font-weight:600;
}

/* CALL SUBTEXT */
#callSub{
    font-size:13px;
    opacity:0.7;
}

/* PARTICIPANT GRID (mobile-first) */
#participants{
    width:100%;
    display:flex;
    justify-content:center;
    gap:12px;
    padding:10px;
    flex-wrap:wrap;
}

.part{
    background:rgba(255,255,255,0.06);
    padding:10px 14px;
    border-radius:12px;
    font-size:13px;
    backdrop-filter: blur(10px);
}

/* BOTTOM CONTROLS (iPhone style dock) */
#controls{
    height:90px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    padding-bottom:20px;
}

/* BUTTONS */
.ctrl{
    width:54px;
    height:54px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    transition:0.2s;
}

/* animations */
.ctrl:active{
    transform:scale(0.9);
}

/* styles */
.end{
    background:#ef4444;
    color:white;
}

.mute{
    background:#374151;
    color:white;
}

.screen{
    background:#1f2937;
}

.record{
    background:#111827;
    border:1px solid rgba(255,255,255,0.15);
}

/* MOBILE SAFE AREA FIX */
@media (max-width: 600px){
    #status{ font-size:26px; }
    #controls{ height:110px; }
}
</style>
</head>

<body>

<div id="loading">🔐 Authenticating...</div>

<div id="app">

<div id="topbar">
    <div>💬 Secret Chat ✨</div>
    <div>
        <span id="userName"></span>
        <button id="callBtn" onclick="startCall()">📞 Call</button>
    </div>
</div>

<div id="container">
<div id="sidebar">
    <div id="chatList"></div>
    <button onclick="createChat()">+ New</button>
</div>

<div id="main">
<div id="chat"></div>
<div id="inputArea">
    <input id="msg">
    <button onclick="send()">Send</button>
</div>
</div>
</div>
</div>

<!-- CALL UI -->
<div id="callUI">
    <div id="callHeader">Call</div>
    <div id="callMain">
        <h2 id="status">Connecting...</h2>
        <div id="callSub">Establishing secure connection...</div>

        <div id="participants"></div>
    </div>

    <div id="controls">
        <button class="ctrl mute" onclick="toggleMute()">Mute</button>
        <button class="ctrl" onclick="acceptCall()">Accept</button>
        <button class="ctrl" onclick="declineCall()">Decline</button>
        <button class="ctrl" onclick="toggleScreen()">Screen</button>
        <button class="ctrl" onclick="toggleRecord()">Record</button>
        <button class="ctrl end" onclick="endCall()">End</button>
    </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
 apiKey:"AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
 authDomain:"secret-chat-6de59.firebaseapp.com",
 databaseURL:"https://secret-chat-6de59-default-rtdb.firebaseio.com",
 projectId:"secret-chat-6de59"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

let user, chatId, callId;
let pc, stream;
let muted=false;
let audioUnlocked = false;

document.addEventListener("click", () => {
    if(!audioUnlocked){
        audioUnlocked = true;
        const r = document.getElementById("ringtone");
        r.play().then(()=>r.pause());
    }
});

/* AUTH */
auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  loading.style.display="none";
  app.style.display="block";
  userName.textContent=u.email;
  loadChats();
  listenCalls();
 } else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
});

/* CHAT FILTER */
function myKey(e){return e.replace(/\./g,"_");}

function loadChats(){
 db.ref("chats").on("child_added",s=>{
  const c=s.val();

  const key = user.email.replace(/\./g,"_");

  // 🔒 HARD FILTER: only show chats you're actually in
  if(!c.members || !c.members[key]) return;

  const d=document.createElement("div");
  d.className="chatItem";
  d.innerHTML=`<div class="avatar">${c.name[0]}</div><div>${c.name}</div>`;
  d.onclick=()=>openChat(s.key);
  chatList.appendChild(d);
 });
}

/* OPEN CHAT + TIMESTAMPS */
function openChat(id){
 chatId=id;
 callBtn.style.display="inline-block";
 chat.innerHTML="";

 db.ref("chats/"+id+"/messages").on("child_added",s=>{
  const m=s.val();
  const r=document.createElement("div");
  r.className="msgRow";
  if(m.sender===user.email) r.classList.add("meRow");

  r.innerHTML=`
  <div class="bubble">
    <b>${m.sender}</b><br>
    ${m.text || ""}
    <div style="font-size:10px;color:gray;margin-top:4px;">
        ${m.time ? formatTime(m.time) : ""}
    </div>
  </div>`;
  chat.appendChild(r);
 });
}

function formatTime(ms){
    const d = new Date(ms);

    let h = d.getHours();
    let m = d.getMinutes();

    const ampm = h >= 12 ? "PM" : "AM";

    h = h % 12;
    h = h || 12;

    m = m < 10 ? "0" + m : m;

    return `${h}:${m} ${ampm}`;
}

/* SEND */
function send(){
 db.ref("chats/"+chatId+"/messages").push({
  sender:user.email,
  text:msg.value,
  time:Date.now()
 });
 msg.value="";
}

/* CALL LOGS FIX */
function pushCallLog(type, from){
 db.ref("chats/"+chatId+"/messages").push({
  sender:"system",
  text:`📞 ${type} call ${from}`,
  time:Date.now()
 });
}

/* MIC */
async function getMic(){
 stream=await navigator.mediaDevices.getUserMedia({audio:true});
}

/* START CALL */
async function startCall(){
 await getMic();

 const snap=await db.ref("chats/"+chatId).once("value");
 const c=snap.val();

 const members=Object.keys(c.members).map(e=>e.replace(/_/g,"."));
 const to=members.find(e=>e!==user.email);

 const call=db.ref("calls").push();

 call.set({
  from:user.email,
  to,
  chatId,
  status:"ringing"
 });

 callId=call.key;
 setup(true);

 pushCallLog("Started by", user.email);

 showUI("Calling "+to);
}

function acceptCall(){
 db.ref("calls/"+callId).update({status:"accepted"});
 setup(false);
}

function declineCall(){
 db.ref("calls/"+callId).update({status:"declined"});
 callUI.style.display="none";
}


/* WEBRTC */
async function setup(isCaller){

    if(pc) pc.close(); // 🔥 prevents ghost calls

    pc=new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

 stream.getTracks().forEach(t=>pc.addTrack(t,stream));

 pc.ontrack=e=>remoteAudio.srcObject=e.streams[0];

 const ref=db.ref("calls/"+callId);

 pc.onicecandidate=e=>{
  if(e.candidate) ref.child("c").push(JSON.stringify(e.candidate));
 };

 if(isCaller){
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  ref.update({offer:JSON.stringify(offer)});
 }

 ref.on("value",async s=>{
  const d=s.val();
  if(!d) return;

  if(d.status==="ended"){
   pushCallLog("Ended by", user.email);
   stopCall();
  }

  if(d.offer && !isCaller){
   await pc.setRemoteDescription(JSON.parse(d.offer));
   const ans=await pc.createAnswer();
   await pc.setLocalDescription(ans);
   ref.update({answer:JSON.stringify(ans),status:"accepted"});
  }

  if(d.answer && isCaller){
   await pc.setRemoteDescription(JSON.parse(d.answer));
  }
 });

 ref.child("c").on("child_added",s=>{
  pc.addIceCandidate(JSON.parse(s.val()));
 });
}

/* RECEIVE */
function listenCalls(){
 db.ref("calls").on("value",s=>{
  const calls=s.val();
  if(!calls) return;

  Object.entries(calls).forEach(([id,c])=>{
   if(c.to===user.email && c.status==="ringing"){

        callId=id;

        // show incoming UI ONLY (no auto setup yet)
        showUI("Incoming from "+c.from);

        // store call but do NOT connect yet
        return;
    }
  });
 });
}

/* UI */
function showUI(t){

    callUI.style.display = "flex";

    status.textContent = t;

    const me = user.email;

    // safer fallback if chat isn't ready yet
    let other = "User";

    if(t.includes("Incoming")){
        other = "Incoming Caller";
    } else if(t.includes("Calling")){
        other = "Outgoing Call";
    }

    participants.innerHTML = `
        <div class="part">🟢 ${me}</div>
        <div class="part">🔵 ${other}</div>
    `;

    const sub = document.getElementById("callSub");
    if(sub){
        sub.textContent = t.includes("Incoming")
            ? "Incoming call..."
            : "In call";
    }
}

/* END FIX (FULL CLEANUP) */
function endCall(){
 if(callId){
  db.ref("calls/"+callId).update({status:"ended"});
 }
 stopCall();
}

function stopCall(){

    if(pc){
        pc.ontrack = null;
        pc.onicecandidate = null;

        pc.getSenders().forEach(s=>{
            if(s.track) s.track.stop();
        });

        pc.close();
        pc = null;
    }

    if(stream){
        stream.getTracks().forEach(t=>t.stop());
        stream = null;
    }

    if(screenStream){
        screenStream.getTracks().forEach(t=>t.stop());
        screenStream = null;
    }

    if(recorder && recording){
        recorder.stop();
        recording = false;
    }

    callUI.style.display="none";

    const ring=document.getElementById("ringtone");
    if(ring){
        ring.pause();
        ring.currentTime=0;
    }
}

function toggleMute(){
 muted=!muted;
 stream.getAudioTracks()[0].enabled=!muted;
}

/* SCREEN + RECORD KEPT SIMPLE */
async function toggleScreen(){
 const screen=await navigator.mediaDevices.getDisplayMedia({video:true});
 const track=screen.getVideoTracks()[0];
 const sender=pc.getSenders().find(s=>s.track.kind==="video");
 if(sender) sender.replaceTrack(track);
}

let recorder, chunks=[], recording=false;

function toggleRecord(){
 if(!stream) return;

 if(!recording){
  chunks=[];
  recorder=new MediaRecorder(stream);
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.start();
  recording=true;
 } else {
  recorder.stop();
  recording=false;
 }
}

</script>

</body>
</html>
