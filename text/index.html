<!DOCTYPE html>
<html>
<head>
<title>Secret Text</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f3f6ff;
}

/* LOADING */
#loading {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    background: white;
}

/* APP */
#app {
    display: none;
    height: 100vh;
}

/* SIDEBAR */
#chatListPanel {
    width: 280px;
    background: #0d2b66;
    color: white;
    height: 100vh;
    float: left;
}

#chatListHeader {
    padding: 15px;
    font-weight: bold;
}

.chatItem {
    padding: 12px;
    cursor: pointer;
}

.chatItem:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN */
#chatContainer {
    margin-left: 280px;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

#chatHeader {
    padding: 12px;
    background: white;
    border-bottom: 1px solid #ddd;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* MESSAGES */
.msgRow {
    max-width: 60%;
    padding: 10px;
    margin: 8px 0;
    background: white;
    border-radius: 10px;
}

.meRow {
    margin-left: auto;
    background: #d9e8ff;
}

.status {
    font-size: 11px;
    color: gray;
}

/* INPUT */
#inputArea {
    display: flex;
    padding: 10px;
    background: white;
    border-top: 1px solid #ddd;
}

#inputArea input {
    flex: 1;
    padding: 10px;
}

button {
    margin-left: 10px;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="loading">Authenticating...</div>

<div id="app">

<div id="chatListPanel">
    <div id="chatListHeader">Chats</div>
    <div id="chatList"></div>
    <button onclick="createChat()">+ New Chat</button>
</div>

<div id="chatContainer">
    <div id="chatHeader">Select a chat</div>
    <div id="chat"></div>

    <div id="typing"></div>

    <div id="inputArea">
        <input id="msg" placeholder="Type a message...">
        <button onclick="send()">Send</button>
    </div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "secret-chat-6de59.firebaseapp.com",
  projectId: "secret-chat-6de59",
  storageBucket: "secret-chat-6de59.firebasestorage.app",
  messagingSenderId: "107760706349",
  appId: "1:107760706349:web:aad5387e7d0003d90ca9a4"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let currentChatId = null;

const allowedEmails = [
    "ishaan.raj111@gmail.com",
    "bhagat.prerna@gmail.com",
    "rakesh.chourasia@gmail.com",
    "3121@student.goldendoorschool.org"
];

/* LOADING */
let dots = 0;
setInterval(() => {
    const el = document.getElementById("loading");
    if (!el) return;
    dots = (dots + 1) % 4;
    el.textContent = "Authenticating" + ".".repeat(dots);
}, 300);

/* AUTH */
auth.onAuthStateChanged(user => {
    const loading = document.getElementById("loading");
    const app = document.getElementById("app");

    if (!user) return;

    const email = (user.email || "").toLowerCase();
    const allowed = allowedEmails.map(e => e.toLowerCase());

    if (!allowed.includes(email)) {
        loading.textContent = "Access denied 🚫";
        auth.signOut();
        return;
    }

    currentUser = user;

    loading.style.display = "none";
    app.style.display = "block";

    setOnline(true);
    loadChats();
});

/* SAFE AUTO LOGIN */
window.addEventListener("load", () => {
    if (!auth.currentUser) {
        auth.signInWithPopup(provider).catch(() => {});
    }
});

/* ONLINE STATUS */
function setOnline(status) {
    if (!currentUser) return;

    db.ref("status/" + currentUser.email.replace(/\./g, "_")).set({
        online: status
    });
}

/* LOAD CHATS */
function loadChats() {
    const chatList = document.getElementById("chatList");
    chatList.innerHTML = "";

    db.ref("chats").on("child_added", snap => {
        const chat = snap.val();

        if (!chat.members || !chat.members[currentUser.email]) return;

        const div = document.createElement("div");
        div.className = "chatItem";
        div.textContent = chat.name;

        div.onclick = () => openChat(snap.key);

        chatList.appendChild(div);
    });
}

/* OPEN CHAT */
function openChat(chatId) {
    currentChatId = chatId;

    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";

    db.ref("chats/" + chatId + "/messages").off();

    db.ref("chats/" + chatId + "/messages")
    .limitToLast(50)
    .on("child_added", snap => {
        const data = snap.val();

        const sender = data.sender;
        const text = data.text;

        const msg = document.createElement("div");
        msg.className = "msgRow";

        if (sender === currentUser.email) {
            msg.classList.add("meRow");
        }

        msg.innerHTML = `
            <div><b>${sender}</b></div>
            <div>${text}</div>
            <div class="status">${data.seen ? "Seen" : "Sent"}</div>
        `;

        chatDiv.appendChild(msg);
        chatDiv.scrollTop = chatDiv.scrollHeight;

        if (sender !== currentUser.email) {
            snap.ref.update({ seen: true });
        }
    });

    enableTyping();
}

/* SEND */
function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();

    if (!text || !currentChatId) return;

    db.ref("chats/" + currentChatId + "/messages").push({
        sender: currentUser.email,
        text: text,
        time: Date.now(),
        seen: false
    });

    input.value = "";
}

/* ENTER */
document.getElementById("msg").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});

/* CREATE CHAT */
function createChat() {
    const emails = prompt("Enter emails:");
    if (!emails) return;

    const list = emails.split(",").map(e => e.trim());
    list.push(currentUser.email);

    const members = {};
    list.forEach(e => members[e] = true);

    const name = prompt("Chat name:");

    db.ref("chats").push({
        name: name || "Chat",
        members: members
    });
}

/* TYPING */
function enableTyping() {
    const input = document.getElementById("msg");

    input.oninput = () => {
        db.ref("typing/" + currentChatId + "/" + currentUser.email.replace(/\./g, "_"))
        .set(true);

        setTimeout(() => {
            db.ref("typing/" + currentChatId + "/" + currentUser.email.replace(/\./g, "_"))
            .remove();
        }, 1000);
    };

    db.ref("typing/" + currentChatId).on("value", snap => {
        const box = document.getElementById("typing");
        const data = snap.val();

        box.textContent = data ? "Someone is typing..." : "";
    });
}
</script>

</body>
</html>
