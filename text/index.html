<!DOCTYPE html>
<html>
<head>
<title>Secret Text</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

/// Clarity Tracking
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wjgudf9jaf");
</script>

<style>
body {
    margin:0;
    font-family:"Segoe UI";
    background:#eef3ff;
}

/* LOADING */
#loading{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #1e3a8a, #2563eb);
    color:white;
    font-size:22px;
}

/* APP WRAPPER */
#app{
    display:none;
    height:100vh;
}

/* TOP BAR */
#topbar{
    height:50px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    font-weight:600;
}

/* LAYOUT */
#container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
#sidebar{
    width:260px;
    background:#0d2b66;
    color:white;
    overflow-y:auto;
}

/* CHAT LIST */
.chatItem{
    padding:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
    border-left:3px solid transparent;
}

.chatItem:hover{
    background:rgba(255,255,255,0.1);
}

.avatar{
    width:32px;
    height:32px;
    border-radius:50%;
    background:#3b82f6;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
}

/* MAIN CHAT */
#main{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
}

/* CHAT BOX */
#chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

/* MESSAGE */
.msgRow{ display:flex; margin:8px 0; }
.meRow{ justify-content:flex-end; }

.bubble{
    max-width:70%;
    padding:10px;
    border-radius:10px;
    background:white;
    word-wrap:break-word;
}

.meRow .bubble{ background:#dbeafe; }

/* INPUT */
#inputArea{
    display:flex;
    padding:10px;
    background:white;
}

#inputArea input{
    flex:1;
    padding:10px;
}

button{
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

/* DELETE BUTTON */
#deleteChatBtn{
    display:none;
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
    z-index:10;
}

/* TYPING */
#typing{
    padding:5px 15px;
    font-size:12px;
    color:gray;
}

/* MOBILE */
@media (max-width: 768px){
    #sidebar{
        width:90px;
    }

    .chatItem{
        flex-direction:column;
        font-size:10px;
        text-align:center;
    }

    .avatar{
        margin:0;
        margin-bottom:5px;
    }

    #inputArea input{
        font-size:16px;
    }

    .bubble{
        max-width:85%;
    }
}
</style>
</head>

<body>

<div id="loading">
    <div style="text-align:center;">
        <div style="font-size:50px;">🔐</div>
        <h2>Authenticating<span id="dots">.</span></h2>
    </div>
</div>

<div id="app">

<div id="topbar">
    <div>💬Ishaan's Secret Chat ✨</div>
    <div id="userName"></div>
</div>

<div id="container">

<div id="sidebar">
    <div id="chatList"></div>
    <button onclick="createChat()">+ New</button>
</div>

<div id="main">

<button id="deleteChatBtn">Delete Chat</button>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
    <input id="msg">
    <button onclick="send()">Send</button>
</div>

</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain:"secret-chat-6de59.firebaseapp.com",
  projectId:"secret-chat-6de59",
  databaseURL:"https://secret-chat-6de59-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser=null;
let currentChatId=null;
let typingRef=null;
let messagesRef=null;

/* ALLOWED EMAILS */
const allowedEmails = [
    "ishaan.raj111@gmail.com",
    "bhagat.prerna@gmail.com",
    "rakesh.chourasia@gmail.com",
    "yashvi.raj111@gmail.com"
];

/* KEY */
function key(){
    return currentUser.email.replace(/\./g,"_");
}

/* AUTH */
auth.onAuthStateChanged(user=>{
    if(user){

        if(!allowedEmails.includes(user.email.toLowerCase())){
            document.body.innerHTML = `
            <div style="
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                background:#111827;
                color:white;
                font-family:Segoe UI;
                flex-direction:column;
                text-align:center;
                padding:20px;
            ">
                <div style="font-size:65px;">🚫</div>
                <h1>Access Denied by the Owner🚫</h1>
                <p>You are not allowed to use this website.</p>
            </div>
            `;
            return;
        }

        currentUser=user;

        document.getElementById("loading").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("userName").textContent=user.email;

        setupPresence();
        loadChats();

    } else {
        auth.signInWithPopup(provider);
    }
});

/* PRESENCE */
function setupPresence(){
    const ref = db.ref("status/"+key());

    db.ref(".info/connected").on("value", snap=>{
        if(!snap.val()) return;

        ref.onDisconnect().set({state:"offline"});
        ref.set({state:"online"});
    });
}

/* LOAD CHATS */
function loadChats(){
    const list=document.getElementById("chatList");
    list.innerHTML="";

    db.ref("chats").on("child_added", snap=>{
        const chat=snap.val();

        if(!chat.members[key()]) return;

        const div=document.createElement("div");
        div.className="chatItem";

        div.innerHTML=`
            <div class="avatar">${chat.name[0]}</div>
            <div>${chat.name}</div>
        `;

        div.onclick=()=>openChat(snap.key);

        list.appendChild(div);
    });
}

/* OPEN CHAT */
function openChat(id){
    currentChatId=id;

    document.getElementById("deleteChatBtn").style.display="block";

    const chat=document.getElementById("chat");
    chat.innerHTML="";

    if(typingRef) typingRef.off();
    document.getElementById("typing").textContent="";

    if(messagesRef){
        messagesRef.off();
    }

    messagesRef = db.ref("chats/"+id+"/messages").limitToLast(50);

    messagesRef.on("child_added", snap=>{
        const d=snap.val();

        const row=document.createElement("div");
        row.className="msgRow";

        if(d.sender===currentUser.email){
            row.classList.add("meRow");
        }

        row.innerHTML=`
        <div class="bubble">
            <b>${d.sender}</b><br>
            ${d.text}
            <div style="font-size:10px;color:gray;margin-top:5px;">
                ${d.time ? formatTime(d.time) : ""}
            </div>
        </div>
        `;

        chat.appendChild(row);
        chat.scrollTop=chat.scrollHeight;
    });

    enableTyping();
}

/* SEND */
function send(){
    const input=document.getElementById("msg");
    const text=input.value.trim();

    if(!text||!currentChatId) return;

    db.ref("chats/"+currentChatId+"/messages").push({
        sender:currentUser.email,
        text:text,
        time:Date.now()
    });

    input.value="";
}

/* DELETE CHAT */
document.getElementById("deleteChatBtn").onclick = function(){
    if(!currentChatId) return;

    if(!confirm("Delete this chat for everyone?")) return;

    db.ref("chats/"+currentChatId).remove();

    document.getElementById("chat").innerHTML="";
    document.getElementById("deleteChatBtn").style.display="none";
    currentChatId=null;
};

/* TYPING */
function enableTyping(){
    const input=document.getElementById("msg");
    const myKey=key();

    typingRef=db.ref("typing/"+currentChatId);

    input.oninput=()=>{
        typingRef.child(myKey).set({email:currentUser.email});

        clearTimeout(window.t);
        window.t=setTimeout(()=>{
            typingRef.child(myKey).remove();
        },1200);
    };

    typingRef.on("value",snap=>{
        const data=snap.val();
        const box=document.getElementById("typing");

        if(!data){
            box.textContent="";
            return;
        }

        const users=Object.values(data)
            .map(u=>u.email)
            .filter(e=>e!==currentUser.email);

        box.textContent =
        users.length ? users.join(", ")+" is typing..." : "";
    });
}

/* CHAT CREATE */
function createChat(){
    const emails=prompt("Emails:");
    if(!emails) return;

    const list=emails.split(",").map(e=>e.trim());
    list.push(currentUser.email);

    const members={};
    list.forEach(e=>{
        members[e.replace(/\./g,"_")]=true;
    });

    const name=prompt("Chat name:");

    db.ref("chats").push({
        name:name||"Chat",
        members:members
    });
}

/* TIME */
function formatTime(ms){
    const d=new Date(ms);
    let h=d.getHours();
    let m=d.getMinutes();

    const ampm=h>=12?"PM":"AM";
    h=h%12;
    h=h||12;
    m=m<10?"0"+m:m;

    return `${h}:${m} ${ampm}`;
}

/* ENTER */
document.getElementById("msg").addEventListener("keydown",e=>{
    if(e.key==="Enter"){
        e.preventDefault();
        send();
    }
});

/* DOT ANIMATION */
setInterval(()=>{
    const el = document.getElementById("dots");
    if(!el) return;

    if(el.textContent === ".") el.textContent = "..";
    else if(el.textContent === "..") el.textContent = "...";
    else el.textContent = ".";
}, 500);

</script>

</body>
</html>
