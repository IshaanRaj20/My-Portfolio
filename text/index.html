<!DOCTYPE html>
<html>
<head>
    <title>Ishaan Teams</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            font-family: "Segoe UI", sans-serif;
            background:#f3f2f1;
        }

        #loading {
            position:fixed;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            background:#0f172a;
            color:white;
        }

        #app {
            display:none;
            height:100vh;
            display:flex;
        }

        /* LEFT NAV */
        #nav {
            width:60px;
            background:#1f1f1f;
            color:white;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding-top:10px;
        }

        .navItem {
            width:40px;
            height:40px;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:10px 0;
            border-radius:10px;
            cursor:pointer;
        }

        .navItem.active {
            background:#2563eb;
        }

        /* CHAT LIST */
        #chatListPanel {
            width:280px;
            background:white;
            border-right:1px solid #ddd;
            display:flex;
            flex-direction:column;
        }

        #chatListHeader {
            padding:15px;
            font-size:18px;
            font-weight:bold;
            border-bottom:1px solid #eee;
        }

        .chatItem {
            display:flex;
            padding:12px;
            gap:10px;
            cursor:pointer;
            border-bottom:1px solid #eee;
            align-items:center;
        }

        .chatItem:hover {
            background:#e8f0fe;
        }

        .chatItem.active {
            background:#dbeafe;
        }

        .avatar {
            width:40px;
            height:40px;
            border-radius:50%;
            background:#2563eb;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
        }

        .chatInfo {
            flex:1;
        }

        .chatTop {
            display:flex;
            justify-content:space-between;
            font-size:14px;
        }

        .chatName {
            font-weight:600;
        }

        .preview {
            font-size:12px;
            color:#666;
        }

        /* MAIN CHAT */
        #chatContainer {
            flex:1;
            display:flex;
            flex-direction:column;
        }

        #chatHeader {
            padding:15px;
            border-bottom:1px solid #ddd;
            font-weight:bold;
            background:white;
        }

        #chat {
            flex:1;
            padding:20px;
            overflow-y:auto;
        }

        .msgRow {
            display:flex;
            gap:10px;
            margin:10px 0;
            align-items:flex-end;
        }

        .meRow {
            flex-direction:row-reverse;
        }

        .avatar.small {
            width:30px;
            height:30px;
            font-size:12px;
        }

        .msgBubble {
            background:white;
            padding:10px;
            border-radius:10px;
            max-width:60%;
            box-shadow:0 1px 2px rgba(0,0,0,0.1);
        }

        .meRow .msgBubble {
            background:#dbeafe;
        }

        .msgName {
            font-size:12px;
            font-weight:bold;
            color:#2563eb;
        }

        .msgTime {
            font-size:10px;
            color:#999;
            margin-top:4px;
        }

        /* INPUT */
        #inputArea {
            display:flex;
            padding:10px;
            background:white;
            border-top:1px solid #ddd;
        }

        #msg {
            flex:1;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button {
            margin-left:8px;
            padding:10px 16px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div id="loading">Authenticating</div>

<div id="app">

    <div id="nav">
        <div class="navItem active">💬</div>
    </div>

    <div id="chatListPanel">
        <div id="chatListHeader">Chats</div>
        <div id="chatList"></div>
        <button onclick="createChat()">+ New Chat</button>
        <p id="userDisplay" style="padding:10px;"></p>
    </div>

    <div id="chatContainer">
        <div id="chatHeader">Select a chat</div>
        <div id="chat"></div>

        <div id="inputArea">
            <input id="msg" placeholder="Type a message...">
            <button onclick="send()">Send</button>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain: "secret-chat-6de59.firebaseapp.com",
  projectId: "secret-chat-6de59",
  storageBucket: "secret-chat-6de59.firebasestorage.app",
  messagingSenderId: "107760706349",
  appId: "1:107760706349:web:aad5387e7d0003d90ca9a4"
};


firebase.initializeApp(firebaseConfig);

// 🔁 Animated "Authenticating..."
let dots = 0;

setInterval(() => {
    const loading = document.getElementById("loading");
    if (!loading) return;

    dots = (dots + 1) % 4;
    loading.innerText = "Authenticating" + ".".repeat(dots);
}, 300);

// ⚡ Keep user logged in
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// 🔥 Auto login attempt
if (!auth.currentUser) {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
}

const auth = firebase.auth();
const db = firebase.database();

const allowedEmails = [
  "ishaan.raj111@gmail.com",
  "bhagat.prerna@gmail.com",
  "rakesh.chourasia@gmail.com",
  "3121@student.goldendoorschool.org"
];

let currentUser = null;
let currentChatId = null;

function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user => {
    const loading = document.getElementById("loading");
    const app = document.getElementById("app");

    // still waiting for login
    if (!user) return;

    // 🚫 block wrong emails
    if (!user.email || !allowedEmails.includes(user.email.toLowerCase())) {
        loading.innerText = "Access denied 🚫";
        auth.signOut();
        return;
    }

    // ✅ success
    currentUser = user;

    document.getElementById("userDisplay").innerText = user.displayName;

    loading.style.display = "none";
    app.style.display = "flex";

    loadChats();
});

function loadChats() {
    const chatList = document.getElementById("chatList");
    chatList.innerHTML = "";

    db.ref("chats").on("child_added", snap => {
        const chat = snap.val();

        if (!chat.members || !chat.members[currentUser.email]) return;

        const div = document.createElement("div");
        div.className = "chatItem";

        div.innerHTML = `
            <div class="avatar">${(chat.name || "C").charAt(0)}</div>
            <div class="chatInfo">
                <div class="chatTop">
                    <span class="chatName">${chat.name || "Chat"}</span>
                    <span class="time">now</span>
                </div>
                <div class="preview">Click to open</div>
            </div>
        `;

        div.onclick = () => {
            document.querySelectorAll(".chatItem").forEach(e => e.classList.remove("active"));
            div.classList.add("active");
            openChat(snap.key);
        };

        chatList.appendChild(div);
    });
}

function openChat(chatId) {
    currentChatId = chatId;

    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";

    db.ref("chats/" + chatId + "/messages").off();

    db.ref("chats/" + chatId + "/messages").on("child_added", snap => {
        const data = snap.val() || {};

        const sender = data.sender || "Unknown";
        const text = data.text || "";
        const time = data.time ? new Date(data.time).toLocaleTimeString() : "";

        const isMe = sender === currentUser.email;

        const msgHTML = `
            <div class="msgRow ${isMe ? 'meRow' : ''}">
                <div class="avatar small">${sender.charAt(0).toUpperCase()}</div>
                <div class="msgBubble">
                    <div class="msgName">${sender}</div>
                    <div>${text}</div>
                    <div class="msgTime">${time}</div>
                </div>
            </div>
        `;

        chatDiv.innerHTML += msgHTML;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}

function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();

    if (!text || !currentChatId) return;

    db.ref("chats/" + currentChatId + "/messages").push({
        sender: currentUser.email,
        text: text,
        time: Date.now()
    });

    input.value = "";
}

document.getElementById("msg").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});

function createChat() {
    const emails = prompt("Enter emails (comma separated):");
    if (!emails) return;

    const list = emails.split(",").map(e => e.trim());
    list.push(currentUser.email);

    const members = {};
    list.forEach(e => members[e] = true);

    const name = prompt("Chat name:");

    db.ref("chats").push({
        name: name || "Chat",
        members: members
    });
}
</script>

</body>
</html>
