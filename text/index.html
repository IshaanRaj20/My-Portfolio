<!DOCTYPE html>
<html>
<head>
<title>Secret Text</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:"Segoe UI"; background:#eef3ff; }

/* LOADING */
#loading {
    position:fixed; inset:0;
    display:flex; justify-content:center; align-items:center;
    background:white; font-size:22px;
}

/* APP */
#app { display:none; height:100vh; }

/* TOP BAR */
#topbar {
    height:50px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    font-weight:600;
}

/* SIDEBAR */
#sidebar {
    width:260px;
    background:#0d2b66;
    color:white;
    height:calc(100vh - 50px);
    float:left;
    overflow-y:auto;
}

.chatItem {
    padding:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
    border-left:3px solid transparent;
}

.chatItem:hover {
    background:rgba(255,255,255,0.1);
    transform:translateX(4px);
}

.chatItem.active {
    background:rgba(255,255,255,0.2);
    border-left:3px solid #60a5fa;
}

/* AVATAR */
.avatar {
    width:32px; height:32px;
    border-radius:50%;
    background:#3b82f6;
    display:flex; align-items:center; justify-content:center;
    margin-right:10px;
    position:relative;
}

.onlineDot {
    position:absolute;
    bottom:0; right:0;
    width:8px; height:8px;
    background:limegreen;
    border-radius:50%;
}

/* MAIN */
#main {
    margin-left:260px;
    height:calc(100vh - 50px);
    display:flex;
    flex-direction:column;
}

/* CHAT HEADER */
#chatHeader {
    padding:10px;
    background:white;
    border-bottom:1px solid #ddd;
}

/* CHAT */
#chat {
    flex:1;
    overflow-y:auto;
    padding:15px;
}

/* MESSAGE */
.msgRow {
    display:flex;
    margin:8px 0;
}

.meRow { justify-content:flex-end; }

.bubble {
    max-width:60%;
    padding:10px;
    border-radius:10px;
    background:white;
    transition:0.2s;
}

.meRow .bubble { background:#dbeafe; }

.msgRow:hover .bubble {
    transform:scale(1.02);
}

/* INPUT */
#inputArea {
    display:flex;
    padding:10px;
    background:white;
    border-top:1px solid #ddd;
}
#inputArea input { flex:1; padding:10px; }

button {
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    background:#1e4fd6;
    transform:scale(1.05);
}

/* TYPING */
#typing {
    padding:5px 15px;
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<div id="loading">Authenticating...</div>

<div id="app">

<div id="topbar">
    <div>💬 Blue Teams</div>
    <div id="userName"></div>
</div>

<div id="sidebar">
    <div id="chatList"></div>
    <button onclick="createChat()">+ New Chat</button>
</div>

<div id="main">
    <div id="chatHeader">Select a chat</div>
    <div id="chat"></div>
    <div id="typing"></div>

    <div id="inputArea">
        <input id="msg">
        <button onclick="send()">Send</button>
    </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain:"secret-chat-6de59.firebaseapp.com",
  projectId:"secret-chat-6de59",
  databaseURL:"https://secret-chat-6de59-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let currentChatId = null;
let typingRef = null;

/* KEY */
function key(){
    return currentUser.email.replace(/\./g,"_");
}

/* AUTH */
auth.onAuthStateChanged(user=>{
    if(!user) return;

    currentUser = user;

    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("userName").textContent=user.email;

    setOnline(true);
    loadChats();
});

window.addEventListener("load",()=>{
    if(!auth.currentUser){
        auth.signInWithPopup(provider).catch(()=>{});
    }
});

/* ONLINE */
function setOnline(status){
    if(!currentUser) return;
    db.ref("status/"+key()).set({online:status});
}

/* LOAD CHATS */
function loadChats(){
    const list=document.getElementById("chatList");
    list.innerHTML=""; // FIX DUPLICATES

    db.ref("chats").on("child_added",snap=>{
        const chat=snap.val();
        if(!chat.members[key()]) return;

        const div=document.createElement("div");
        div.className="chatItem";

        div.innerHTML=`
        <div class="avatar">${chat.name[0]}</div>
        ${chat.name}
        `;

        div.onclick=()=>{
            document.querySelectorAll(".chatItem")
            .forEach(e=>e.classList.remove("active"));

            div.classList.add("active");
            openChat(snap.key);
        };

        list.appendChild(div);
    });
}

/* OPEN CHAT */
function openChat(id){
    currentChatId=id;

    const chatDiv=document.getElementById("chat");
    chatDiv.innerHTML="";

    const header=document.getElementById("chatHeader");

    db.ref("chats/"+id).once("value",snap=>{
        const chat=snap.val();
        header.innerHTML=`
            <div style="font-weight:600">${chat?.name||"Chat"}</div>
            <div style="font-size:12px;color:gray">Active chat</div>
        `;
    });

    db.ref("chats/"+id+"/messages").off();
    if(typingRef) typingRef.off();

    document.getElementById("typing").textContent="";

    db.ref("chats/"+id+"/messages")
    .limitToLast(50)
    .on("child_added",snap=>{
        const d=snap.val()||{};

        const row=document.createElement("div");
        row.className="msgRow";

        if(d.sender===currentUser.email){
            row.classList.add("meRow");
        }

        row.innerHTML=`
        <div class="bubble">
            <b>${d.sender}</b><br>
            ${d.text}
        </div>
        `;

        chatDiv.appendChild(row);
        chatDiv.scrollTop=chatDiv.scrollHeight;
    });

    enableTyping();
}

/* SEND */
function send(){
    const input=document.getElementById("msg");
    const text=input.value.trim();

    if(!text||!currentChatId) return;

    db.ref("chats/"+currentChatId+"/messages").push({
        sender:currentUser.email,
        text:text,
        seen:false
    });

    input.value="";
}

/* TYPING */
function enableTyping(){
    const input=document.getElementById("msg");

    const myKey=key();

    typingRef=db.ref("typing/"+currentChatId);

    input.oninput=()=>{
        typingRef.child(myKey).set(currentUser.email);

        setTimeout(()=>{
            typingRef.child(myKey).remove();
        },1000);
    };

    typingRef.on("value",snap=>{
        const data=snap.val()||{};
        const box=document.getElementById("typing");

        const users=Object.values(data)
        .filter(e=>e!==currentUser.email);

        if(users.length===0) box.textContent="";
        else box.textContent=users.join(", ")+" is typing...";
    });
}

/* CREATE */
function createChat(){
    const emails=prompt("Emails:");
    if(!emails) return;

    const list=emails.split(",").map(e=>e.trim());
    list.push(currentUser.email);

    const members={};
    list.forEach(e=>members[e.replace(/\./g,"_")]=true);

    const name=prompt("Chat name:");

    db.ref("chats").push({
        name:name||"Chat",
        members:members
    });
}
</script>

</body>
</html>
