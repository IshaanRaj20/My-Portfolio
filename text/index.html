<!DOCTYPE html>
<html>
<head>
<title>Secret Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:"Segoe UI";
    background:#eef3ff;
}

/* LOADING */
#loading{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #1e3a8a, #2563eb);
    color:white;
    font-size:22px;
}

/* APP */
#app{
    display:none;
    height:100vh;
}

/* TOPBAR */
#topbar{
    height:50px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    font-weight:600;
}

/* CALL BUTTON (hidden by default) */
#callBtn{
    display:none;
    margin-left:auto;
    padding:8px 12px;
    background:#1d4ed8;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* LAYOUT */
#container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
#sidebar{
    width:260px;
    background:#0d2b66;
    color:white;
    overflow-y:auto;
}

/* CHAT ITEM */
.chatItem{
    padding:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
}

.chatItem:hover{
    background:rgba(255,255,255,0.1);
}

.avatar{
    width:32px;
    height:32px;
    border-radius:50%;
    background:#3b82f6;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
}

/* MAIN */
#main{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
}

/* CHAT */
#chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msgRow{ display:flex; margin:8px 0; }
.meRow{ justify-content:flex-end; }

.bubble{
    max-width:70%;
    padding:10px;
    border-radius:10px;
    background:white;
    word-wrap:break-word;
}

/* INPUT */
#inputArea{
    display:flex;
    padding:10px;
    background:white;
}

#inputArea input{
    flex:1;
    padding:10px;
}

button{
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

/* CALL POPUP */
#callPopup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    color:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    text-align:center;
}

/* Hide scrollbar but keep scrolling working */
#chat,
#sidebar {
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none; /* IE/Edge old */
}

#chat::-webkit-scrollbar,
#sidebar::-webkit-scrollbar {
    display: none; /* Chrome/Safari */
}
</style>
</head>

<body>

<div id="loading">
    <div>🔐 Authenticating...</div>
</div>

<div id="app">

<div id="topbar">
    <div>💬 Ishaan's Secret Chat ✨</div>

    <div style="display:flex; align-items:center;">
        <div id="userName"></div>

        <!-- CALL BUTTON (ONLY WHEN CHAT OPEN) -->
        <button id="callBtn" onclick="startCall()">📞 Call</button>
    </div>
</div>

<div id="container">

<div id="sidebar">
    <div id="chatList"></div>
    <button onclick="createChat()">+ New</button>
</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">
    <input id="msg">
    <button onclick="send()">Send</button>
</div>

</div>
</div>
</div>

<!-- CALL UI -->
<div id="callPopup">
    <h2 id="callText">Incoming Call</h2>
    <div style="margin-top:20px;">
        <button onclick="acceptCall()">Accept</button>
        <button onclick="declineCall()" style="background:red;">Decline</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain:"secret-chat-6de59.firebaseapp.com",
  databaseURL:"https://secret-chat-6de59-default-rtdb.firebaseio.com",
  projectId:"secret-chat-6de59"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser=null;
let currentChatId=null;
let currentCallId=null;

/* AUTH */
auth.onAuthStateChanged(user=>{
    if(user){
        currentUser=user;

        document.getElementById("loading").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("userName").textContent=user.email;

        loadChats();
        listenForCalls();

    } else {
        auth.signInWithPopup(provider);
    }
});

/* LOAD CHATS */
function loadChats(){
    const list=document.getElementById("chatList");
    list.innerHTML="";

    db.ref("chats").on("child_added", snap=>{
        const chat=snap.val();

        const div=document.createElement("div");
        div.className="chatItem";

        div.innerHTML=`
            <div class="avatar">${chat.name[0]}</div>
            <div>${chat.name}</div>
        `;

        div.onclick=()=>openChat(snap.key);
        list.appendChild(div);
    });
}

/* OPEN CHAT */
function openChat(id){
    currentChatId=id;

    // SHOW CALL BUTTON ONLY WHEN CHAT OPEN
    document.getElementById("callBtn").style.display="inline-block";

    const chat=document.getElementById("chat");
    chat.innerHTML="";

    db.ref("chats/"+id+"/messages")
    .limitToLast(50)
    .on("child_added", snap=>{

        const d=snap.val();

        const row=document.createElement("div");
        row.className="msgRow";

        if(d.sender===currentUser.email){
            row.classList.add("meRow");
        }

        row.innerHTML=`
        <div class="bubble">
            <b>${d.sender}</b><br>
            ${d.text}
            <div style="font-size:10px;color:gray;margin-top:5px;">
                ${d.time ? formatTime(d.time) : ""}
            </div>
        </div>
        `;

        chat.appendChild(row);
        chat.scrollTop=chat.scrollHeight;
    });
}

/* SEND */
function send(){
    const input=document.getElementById("msg");
    const text=input.value.trim();

    if(!text||!currentChatId) return;

    db.ref("chats/"+currentChatId+"/messages").push({
        sender:currentUser.email,
        text:text,
        time:Date.now()
    });

    input.value="";
}

/* CREATE CHAT */
function createChat(){
    const emails=prompt("Emails:");
    const name=prompt("Chat name:");

    const list=emails.split(",").map(e=>e.trim());
    list.push(currentUser.email);

    const members={};
    list.forEach(e=>{
        members[e.replace(/\./g,"_")]=true;
    });

    db.ref("chats").push({
        name:name||"Chat",
        members:members
    });
}

/* CALL */
function startCall(){
    if(!currentChatId) return;

    db.ref("chats/"+currentChatId).once("value", snap=>{
        const chat=snap.val();

        const members = Object.keys(chat.members)
            .map(e=>e.replace("_","."));

        const to = members.find(e=>e!==currentUser.email);

        const callRef = db.ref("calls").push();

        callRef.set({
            from: currentUser.email,
            to: to,
            chatId: currentChatId,
            status: "ringing"
        });

        currentCallId = callRef.key;
    });
}

/* LISTEN CALLS */
function listenForCalls(){

    db.ref("calls").on("value", snap=>{
        const calls = snap.val();
        if(!calls) return;

        Object.entries(calls).forEach(([id, call])=>{

            if(call.to === currentUser.email && call.status === "ringing"){

                currentCallId = id;

                document.getElementById("callText").innerText =
                    call.from + " is calling you";

                document.getElementById("callPopup").style.display="flex";
            }
        });
    });
}

/* ACCEPT */
function acceptCall(){
    db.ref("calls/"+currentCallId).update({status:"accepted"});
    document.getElementById("callPopup").style.display="none";
    alert("Call started");
}

/* DECLINE */
function declineCall(){
    db.ref("calls/"+currentCallId).update({status:"declined"});
    document.getElementById("callPopup").style.display="none";
}

/* TIME */
function formatTime(ms){
    const d=new Date(ms);
    let h=d.getHours();
    let m=d.getMinutes();

    const ampm=h>=12?"PM":"AM";
    h=h%12;
    h=h||12;
    m=m<10?"0"+m:m;

    return `${h}:${m} ${ampm}`;
}
</script>

</body>
</html>
