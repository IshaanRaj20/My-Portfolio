<!DOCTYPE html>
<html>
<head>
<title>Secret Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:"Segoe UI";
    background:#eef3ff;
}

/* hide scrollbars but KEEP UI SAME */
#chat, #sidebar {
    scrollbar-width:none;
    -ms-overflow-style:none;
}
#chat::-webkit-scrollbar,
#sidebar::-webkit-scrollbar { display:none; }

/* LOADING */
#loading{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    font-size:22px;
}

/* APP */
#app{ display:none; height:100vh; }

#topbar{
    height:50px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    font-weight:600;
}

#callBtn{
    display:none;
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

#container{
    display:flex;
    height:calc(100vh - 50px);
}

#sidebar{
    width:260px;
    background:#0d2b66;
    color:white;
    overflow-y:auto;
}

.chatItem{
    padding:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
}

.chatItem:hover{
    background:rgba(255,255,255,0.1);
}

.avatar{
    width:32px;
    height:32px;
    border-radius:50%;
    background:#3b82f6;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
}

#main{
    flex:1;
    display:flex;
    flex-direction:column;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msgRow{ display:flex; margin:8px 0; }
.meRow{ justify-content:flex-end; }

.bubble{
    max-width:70%;
    padding:10px;
    border-radius:10px;
    background:white;
}

#inputArea{
    display:flex;
    padding:10px;
    background:white;
}

#inputArea input{
    flex:1;
    padding:10px;
}

button{
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

/* CALL UI */
#callUI{
    display:none;
    position:fixed;
    inset:0;
    background:#0b1220;
    color:white;
    z-index:9999;
    flex-direction:column;
}

#callHeader{
    padding:15px;
    border-bottom:1px solid #1f2937;
}

#callMain{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

#controls{
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    border-top:1px solid #1f2937;
}

.ctrl{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.end{ background:red; }
.mute{ background:#334155; }

audio{ display:none; }
</style>
</head>

<body>

<div id="loading">🔐 Authenticating...</div>

<div id="app">

<div id="topbar">
    <div>💬 Secret Chat</div>
    <div>
        <span id="userName"></span>
        <button id="callBtn" onclick="startCall()">📞 Call</button>
    </div>
</div>

<div id="container">

<div id="sidebar">
    <div id="chatList"></div>
    <button onclick="createChat()">+ New</button>
</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">
    <input id="msg">
    <button onclick="send()">Send</button>
</div>

</div>
</div>
</div>

<!-- CALL UI -->
<div id="callUI">
<div id="callHeader">Call</div>
<div id="callMain"><h2 id="status">Connecting...</h2></div>

<div id="controls">
    <button class="ctrl mute" onclick="toggleMute()">Mute</button>
    <button class="ctrl" onclick="toggleScreen()">Screen</button>
    <button class="ctrl" onclick="toggleRecord()">Record</button>
    <button class="ctrl end" onclick="endCall()">End</button>
</div>
</div>

<audio id="ringtone" loop>
  <source src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg">
</audio>

<audio id="remoteAudio" autoplay></audio>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey:"AIzaSyDp1LSm2HlZ3xBDlwBPnEU62Es_KoyavUw",
  authDomain:"secret-chat-6de59.firebaseapp.com",
  databaseURL:"https://secret-chat-6de59-default-rtdb.firebaseio.com",
  projectId:"secret-chat-6de59"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

let user=null;
let chatId=null;
let callId=null;
let pc=null;
let stream=null;
let screenStream=null;
let recorder=null;
let chunks=[];
let muted=false;

const servers={iceServers:[{urls:"stun:stun.l.google.com:19302"}]};

/* AUTH */
auth.onAuthStateChanged(u=>{
if(u){
user=u;
loading.style.display="none";
app.style.display="block";
userName.textContent=u.email;
loadChats();
listenCalls();
}else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
});

/* CHAT */
function loadChats(){
db.ref("chats").on("child_added",s=>{
const c=s.val();
const d=document.createElement("div");
d.className="chatItem";
d.innerHTML=`<div class="avatar">${c.name[0]}</div><div>${c.name}</div>`;
d.onclick=()=>openChat(s.key);
chatList.appendChild(d);
});
}

function openChat(id){
chatId=id;
callBtn.style.display="inline-block";
chat.innerHTML="";
db.ref("chats/"+id+"/messages").on("child_added",s=>{
const m=s.val();
const r=document.createElement("div");
r.className="msgRow";
if(m.sender===user.email) r.classList.add("meRow");
r.innerHTML=`<div class="bubble"><b>${m.sender}</b><br>${m.text}</div>`;
chat.appendChild(r);
});
}

function send(){
db.ref("chats/"+chatId+"/messages").push({
sender:user.email,
text:msg.value
});
msg.value="";
}

/* MIC */
async function getMic(){
stream=await navigator.mediaDevices.getUserMedia({audio:true});
}

/* CALL */
async function startCall(){
await getMic();
const snap=await db.ref("chats/"+chatId).once("value");
const chat=snap.val();

const members=Object.keys(chat.members).map(e=>e.replace(/_/g,"."));
const to=members.find(e=>e!==user.email);

const c=db.ref("calls").push();

c.set({from:user.email,to,chatId,status:"ringing"});

callId=c.key;
setup(true);
showUI("Calling "+to);
}

/* WEBRTC */
async function setup(isCaller){
pc=new RTCPeerConnection(servers);

stream.getTracks().forEach(t=>pc.addTrack(t,stream));

pc.ontrack=e=>remoteAudio.srcObject=e.streams[0];

const ref=db.ref("calls/"+callId);

pc.onicecandidate=e=>{
if(e.candidate) ref.child("c").push(JSON.stringify(e.candidate));
};

if(isCaller){
const offer=await pc.createOffer();
await pc.setLocalDescription(offer);
ref.update({offer:JSON.stringify(offer)});
}

ref.on("value",async s=>{
const d=s.val();
if(!d) return;

if(d.offer && !isCaller){
await pc.setRemoteDescription(JSON.parse(d.offer));
const ans=await pc.createAnswer();
await pc.setLocalDescription(ans);
ref.update({answer:JSON.stringify(ans),status:"accepted"});
}

if(d.answer && isCaller){
await pc.setRemoteDescription(JSON.parse(d.answer));
}

if(d.status==="ended") stopCall();
});

ref.child("c").on("child_added",s=>{
pc.addIceCandidate(JSON.parse(s.val()));
});
}

/* RECEIVE */
function listenCalls(){
db.ref("calls").on("value",s=>{
const calls=s.val();
if(!calls) return;

Object.entries(calls).forEach(([id,c])=>{
if(c.to===user.email && c.status==="ringing"){
callId=id;
document.getElementById("ringtone").play();
setup(false);
showUI("Incoming Call");
}
});
});
}

/* UI */
function showUI(t){
callUI.style.display="flex";
status.textContent=t;
}

/* END */
function endCall(){
if(callId) db.ref("calls/"+callId).update({status:"ended"});
stopCall();
}

function stopCall(){
if(pc) pc.close();
if(stream) stream.getTracks().forEach(t=>t.stop());
if(screenStream) screenStream.getTracks().forEach(t=>t.stop());

callUI.style.display="none";
document.getElementById("ringtone").pause();
}

/* FEATURES */
function toggleMute(){
muted=!muted;
stream.getAudioTracks()[0].enabled=!muted;
}

async function toggleScreen(){
screenStream=await navigator.mediaDevices.getDisplayMedia({video:true});
const track=screenStream.getVideoTracks()[0];
const sender=pc.getSenders().find(s=>s.track.kind==="video");
if(sender) sender.replaceTrack(track);
}

/* RECORD */
function toggleRecord(){
if(!recorder){
chunks=[];
recorder=new MediaRecorder(stream);
recorder.ondataavailable=e=>chunks.push(e.data);
recorder.onstop=()=>{
const blob=new Blob(chunks);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="call.webm";
a.click();
};
recorder.start();
}else{
recorder.stop();
recorder=null;
}
}

</script>

</body>
</html>
